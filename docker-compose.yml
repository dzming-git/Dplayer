version: '3.8'

services:
  # Dplayer主应用
  dplayer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dplayer-app
    restart: unless-stopped
    ports:
      - "8080:80"  # 主机端口:容器端口
    environment:
      - DPLAYER_HOST=0.0.0.0
      - DPLAYER_PORT=80
      - DPLAYER_DEBUG=False
      - DPLAYER_SECRET_KEY=your-secret-key-here-change-in-production
      - DPLAYER_THUMBNAIL_SERVICE_ENABLED=true
      - DPLAYER_THUMBNAIL_SERVICE_URL=http://thumbnail-service:5001
      - DPLAYER_THUMBNAIL_FALLBACK_ENABLED=true
      - DPLAYER_GIT_ENABLED=true
      - DPLAYER_GIT_USER_NAME=${GIT_USER_NAME:-Docker User}
      - DPLAYER_GIT_USER_EMAIL=${GIT_USER_EMAIL:-docker@example.com}
      - DPLAYER_LOG_LEVEL=INFO
    volumes:
      # 配置文件挂载
      - ./data/config:/config
      # 统一内容目录挂载（推荐）
      - ./content:/content
      # 日志目录挂载
      - ./logs:/logs
      # 挂载配置文件（可选，用于自定义挂载）
      - ./mounts_config.json:/config/mounts.json:ro
    networks:
      - dplayer-network
    depends_on:
      - thumbnail-service
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # 缩略图微服务
  thumbnail-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dplayer-thumbnail-service
    restart: unless-stopped
    ports:
      - "5001:5001"  # 主机端口:容器端口
    environment:
      - DPLAYER_HOST=0.0.0.0
      - DPLAYER_PORT=5001
      - DPLAYER_DEBUG=False
      - SERVICE_TYPE=thumbnail  # 标识这是缩略图服务
    volumes:
      - ./content:/content
      - ./logs:/logs
    networks:
      - dplayer-network
    command: ["python", "thumbnail_service.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  dplayer-network:
    driver: bridge

# 数据卷定义（可选）
volumes:
  dplayer-config:
    driver: local
  dplayer-data:
    driver: local
  dplayer-logs:
    driver: local
