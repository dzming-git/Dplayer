<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Dplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.3);
            color: white;
            backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .services-list {
            margin-bottom: 20px;
        }

        .service-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .service-item:hover {
            background: #e9ecef;
        }

        .service-item.running {
            border-left-color: #28a745;
        }

        .service-item.stopped {
            border-left-color: #dc3545;
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .service-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 12px;
            color: white;
            font-weight: normal;
        }

        .status-badge.status-success {
            background: #28a745;
        }

        .status-badge.status-danger {
            background: #dc3545;
        }

        .service-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .service-actions .btn {
            flex: none;
            min-width: 70px;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .status-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .status-item.success {
            border-left-color: #28a745;
        }

        .status-item.warning {
            border-left-color: #ffc107;
        }

        .status-item.danger {
            border-left-color: #dc3545;
        }

        .status-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn.loading {
            pointer-events: none;
        }

        .btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            margin: -8px 0 0 -8px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            color: #333;
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .alert.warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            font-weight: bold;
            color: #333;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .logs-container {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.4;
        }

        .log-line {
            padding: 2px 0;
            border-bottom: 1px solid #2e2e2e;
        }

        .log-line.error {
            color: #ff6b6b;
        }

        .log-line.warning {
            color: #ffd93d;
        }

        .log-line.info {
            color: #6bcb77;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination button:hover:not(.active):not(:disabled) {
            background: #f8f9fa;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .refresh-time {
            text-align: right;
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        /* 手机端响应式样式 */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .header p {
                font-size: 0.9em;
            }

            .tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                gap: 8px;
                padding-bottom: 5px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 0.9em;
                white-space: nowrap;
            }

            .card {
                padding: 15px;
                margin-bottom: 15px;
            }

            .card h2 {
                font-size: 1.1em;
                margin-bottom: 15px;
            }

            /* 服务列表 */
            .services-list {
                margin-bottom: 15px;
            }

            .service-item {
                padding: 12px;
                margin-bottom: 10px;
            }

            .service-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .service-name {
                font-size: 1em;
            }

            .service-info {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .service-actions {
                width: 100%;
                flex-wrap: wrap;
            }

            .service-actions .btn {
                flex: 1;
                min-width: 60px;
                padding: 6px 10px;
                font-size: 0.8em;
            }

            /* 表格 */
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .data-table {
                min-width: 600px;
            }

            .data-table th,
            .data-table td {
                padding: 10px 8px;
                font-size: 0.85em;
            }

            /* 按钮 */
            .btn {
                padding: 8px 16px;
                font-size: 0.85em;
            }

            /* 表单 */
            .form-row {
                flex-direction: column;
                gap: 15px;
            }

            .form-group {
                margin-bottom: 12px;
            }

            .form-group input,
            .form-group textarea,
            .form-group select {
                padding: 10px 12px;
                font-size: 14px;
            }

            /* 操作栏 */
            .action-bar {
                flex-direction: column;
                gap: 10px;
            }

            .action-bar .btn {
                width: 100%;
            }

            /* 搜索 */
            .search-box {
                flex-direction: column;
                gap: 10px;
            }

            .search-box input {
                width: 100%;
            }

            .search-box .btn {
                width: 100%;
            }
        }

        /* 更小屏幕 */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.3em;
            }

            .header p {
                font-size: 0.8em;
            }

            .service-info {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 12px;
                border-radius: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Dplayer 管理后台</h1>
            <p>双端口架构 · 独立管理 · 细粒度控制</p>
            <div class="refresh-time">最后更新: <span id="refreshTime">--</span></div>
        </div>

        <!-- 标签页导航 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('services')">服务管理</button>
            <button class="tab-btn" onclick="switchTab('videos')">视频管理</button>
            <button class="tab-btn" onclick="switchTab('tags')">标签管理</button>
            <button class="tab-btn" onclick="switchTab('database')">数据库</button>
            <button class="tab-btn" onclick="switchTab('logs')">日志查看</button>
        </div>

        <!-- 服务管理 -->
        <div class="tab-content active" id="tab-services">
            <div class="card">
                <h2>⚙️ 服务管理</h2>
                <div class="services-list" id="servicesList">
                    <div class="service-item">
                        <div class="service-name">加载中...</div>
                    </div>
                </div>
                <div class="system-status" id="systemStatus" style="display:none;">
                    <div class="status-item" style="margin-bottom:10px;">
                        <div class="status-label">系统负载</div>
                        <div class="status-value">--</div>
                    </div>
                    <div class="status-item" style="margin-bottom:10px;">
                        <div class="status-label">内存使用</div>
                        <div class="status-value">--</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">磁盘使用</div>
                        <div class="status-value">--</div>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="refreshServices()" id="refreshBtn">刷新</button>
                </div>
                <div id="appAlert" class="alert"></div>
            </div>
        </div>

        <!-- 视频管理 -->
        <div class="tab-content" id="tab-videos">
            <div class="card">
                <h2>📹 视频管理</h2>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="loadVideos()">刷新视频列表</button>
                    <button class="btn btn-success" onclick="showAddVideoModal()">添加视频</button>
                    <button class="btn btn-danger" onclick="clearAllVideos()">清空所有视频</button>
                </div>

                <div class="table-container">
                    <table id="videosTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>标题</th>
                                <th>URL</th>
                                <th>时长</th>
                                <th>优先级</th>
                                <th>已下载</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="7" style="text-align: center;">点击"刷新视频列表"加载视频</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="videoPagination"></div>

                <div id="videoAlert" class="alert"></div>
            </div>
        </div>

        <!-- 标签管理 -->
        <div class="tab-content" id="tab-tags">
            <div class="card">
                <h2>🏷️ 标签管理</h2>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="loadTags()">刷新标签列表</button>
                    <button class="btn btn-success" onclick="showAddTagModal()">添加标签</button>
                    <button class="btn btn-danger" onclick="clearAllTags()">清空所有标签</button>
                </div>

                <div class="table-container">
                    <table id="tagsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>分类</th>
                                <th>视频数</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="5" style="text-align: center;">点击"刷新标签列表"加载标签</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="tagAlert" class="alert"></div>
            </div>
        </div>

        <!-- 数据管理 -->
        <div class="tab-content" id="tab-database">
            <div class="card">
                <h2>💾 数据管理</h2>
                <div class="status-grid">
                    <div class="status-item">
                        <div class="status-label">视频总数</div>
                        <div class="status-value" id="videoCount">--</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">标签总数</div>
                        <div class="status-value" id="tagCount">--</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">收藏数</div>
                        <div class="status-value" id="favoriteCount">--</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">浏览数</div>
                        <div class="status-value" id="viewCount">--</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">数据库大小</div>
                        <div class="status-value" id="dbSize">--</div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="refreshDbStats()">刷新统计</button>
                    <button class="btn btn-danger" onclick="confirmClear()">清理数据</button>
                </div>

                <div id="dbAlert" class="alert"></div>
            </div>
        </div>

        <!-- 日志查看 -->
        <div class="tab-content" id="tab-logs">
            <div class="card">
                <h2>📝 日志查看</h2>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="loadLogs('admin', 100)">管理日志</button>
                    <button class="btn btn-primary" onclick="loadLogs('app', 100)">应用日志</button>
                    <button class="btn btn-primary" onclick="loadLogs('thumbnail', 50)">缩略图日志</button>
                    <button class="btn btn-warning" onclick="clearLogs()">清空日志</button>
                </div>
                <div class="logs-container" id="logsContainer">
                    <div class="log-line">点击上方按钮加载日志...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加视频模态框 -->
    <div class="modal" id="addVideoModal">
        <div class="modal-content">
            <h3>添加视频</h3>
            <form id="addVideoForm" onsubmit="addVideo(event)">
                <div class="form-group">
                    <label>视频标题 *</label>
                    <input type="text" id="videoTitle" required>
                </div>
                <div class="form-group">
                    <label>视频URL *</label>
                    <input type="url" id="videoUrl" required>
                </div>
                <div class="form-group">
                    <label>缩略图URL</label>
                    <input type="url" id="videoThumbnail">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="videoDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>优先级</label>
                    <input type="number" id="videoPriority" value="0">
                </div>
                <div class="button-group">
                    <button type="submit" class="btn btn-success">添加</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal('addVideoModal')">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 添加标签模态框 -->
    <div class="modal" id="addTagModal">
        <div class="modal-content">
            <h3>添加标签</h3>
            <form id="addTagForm" onsubmit="addTag(event)">
                <div class="form-group">
                    <label>标签名称 *</label>
                    <input type="text" id="tagName" required>
                </div>
                <div class="form-group">
                    <label>标签分类</label>
                    <input type="text" id="tagCategory" placeholder="例如：类型、作者、地区">
                </div>
                <div class="button-group">
                    <button type="submit" class="btn btn-success">添加</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal('addTagModal')">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
