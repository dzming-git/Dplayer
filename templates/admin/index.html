<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Dplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2::before {
            content: '📊';
        }

        .card.app-control h2::before {
            content: '⚙️';
        }

        .card.db-control h2::before {
            content: '🗄️';
        }

        .card.logs h2::before {
            content: '📝';
        }

        .services-list {
            margin-bottom: 20px;
        }

        .service-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .service-item:hover {
            background: #e9ecef;
        }

        .service-item.running {
            border-left-color: #28a745;
        }

        .service-item.stopped {
            border-left-color: #dc3545;
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .service-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 12px;
            color: white;
            font-weight: normal;
        }

        .status-badge.status-success {
            background: #28a745;
        }

        .status-badge.status-danger {
            background: #dc3545;
        }

        .service-name .status-badge {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 12px;
            color: white;
        }

        .service-name .status-badge.running {
            background: #28a745;
        }

        .service-name .status-badge.stopped {
            background: #dc3545;
        }

        .service-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .service-desc {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .service-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 0.85em;
            color: #666;
            margin-bottom: 12px;
        }

        .service-info div {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .service-info span {
            font-weight: 500;
        }

        .service-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .service-actions .btn {
            flex: none;
            min-width: 70px;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .system-status {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .status-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .status-item.success {
            border-left-color: #28a745;
        }

        .status-item.warning {
            border-left-color: #ffc107;
        }

        .status-item.danger {
            border-left-color: #dc3545;
        }

        .status-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            color: #333;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .checkbox-item:hover {
            background: #e9ecef;
        }

        .checkbox-item input[type="checkbox"] {
            margin-right: 10px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-item label {
            cursor: pointer;
            flex: 1;
        }

        .checkbox-item .count {
            color: #666;
            font-size: 0.9em;
        }

        .logs-container {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.4;
        }

        .logs-container::-webkit-scrollbar {
            width: 8px;
        }

        .logs-container::-webkit-scrollbar-track {
            background: #2e2e2e;
        }

        .logs-container::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        .log-line {
            padding: 2px 0;
            border-bottom: 1px solid #2e2e2e;
        }

        .log-line.error {
            color: #ff6b6b;
        }

        .log-line.warning {
            color: #ffd93d;
        }

        .log-line.info {
            color: #6bcb77;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .alert.warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .refresh-time {
            text-align: right;
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
            margin-top: 10px;
        }

        .db-stats {
            margin-top: 20px;
        }

        .db-stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .db-stat-label {
            color: #666;
        }

        .db-stat-value {
            font-weight: bold;
            color: #333;
        }

        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .confirm-dialog.show {
            display: flex;
        }

        .confirm-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }

        .confirm-box h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .confirm-box p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .confirm-box .button-group {
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Dplayer 管理后台</h1>
            <p>双端口架构 · 独立管理 · 细粒度控制</p>
            <div class="refresh-time">最后更新: <span id="refreshTime">--</span></div>
            <div style="margin-top:14px;">
                <a href="/services" style="display:inline-flex;align-items:center;gap:8px;background:rgba(124,140,251,0.18);color:#7c8cfb;border:1px solid rgba(124,140,251,0.35);border-radius:8px;padding:8px 18px;text-decoration:none;font-size:14px;font-weight:600;transition:background 0.2s;" onmouseover="this.style.background='rgba(124,140,251,0.3)'" onmouseout="this.style.background='rgba(124,140,251,0.18)'">
                    📊 服务管理中心
                </a>
            </div>
        </div>

        <div class="dashboard">
            <!-- 应用控制 - 服务管理 -->
            <div class="card app-control">
                <h2>服务管理</h2>
                <div class="services-list" id="servicesList">
                    <div class="service-item">
                        <div class="service-name">加载中...</div>
                    </div>
                </div>
                <div class="system-status" id="systemStatus" style="display:none;">
                    <div class="status-item" style="margin-bottom:10px;">
                        <div class="status-label">系统负载</div>
                        <div class="status-value">--</div>
                    </div>
                    <div class="status-item" style="margin-bottom:10px;">
                        <div class="status-label">内存使用</div>
                        <div class="status-value">--</div>
                    </div>
                    <div class="status-item">
                        <div class="status-label">磁盘使用</div>
                        <div class="status-value">--</div>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="refreshServices()" id="refreshBtn">刷新</button>
                </div>
                <div id="appAlert" class="alert"></div>
            </div>

            <!-- 数据库管理 -->
            <div class="card db-control">
                <h2>数据库管理</h2>
                <div class="db-stats" id="dbStats">
                    <div class="db-stat-item">
                        <span class="db-stat-label">视频总数</span>
                        <span class="db-stat-value">--</span>
                    </div>
                    <div class="db-stat-item">
                        <span class="db-stat-label">标签总数</span>
                        <span class="db-stat-value">--</span>
                    </div>
                    <div class="db-stat-item">
                        <span class="db-stat-label">收藏数</span>
                        <span class="db-stat-value">--</span>
                    </div>
                    <div class="db-stat-item">
                        <span class="db-stat-label">浏览数</span>
                        <span class="db-stat-value">--</span>
                    </div>
                    <div class="db-stat-item">
                        <span class="db-stat-label">数据库大小</span>
                        <span class="db-stat-value">--</span>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="refreshDbStats()">刷新统计</button>
                    <button class="btn btn-danger" onclick="confirmClear()">清理数据</button>
                </div>

                <div id="dbAlert" class="alert"></div>
            </div>

            <!-- 日志查看 -->
            <div class="card logs">
                <h2>系统日志</h2>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="loadLogs('admin', 100)">管理日志</button>
                    <button class="btn btn-primary" onclick="loadLogs('app', 100)">应用日志</button>
                    <button class="btn btn-primary" onclick="loadLogs('thumbnail', 50)">缩略图日志</button>
                </div>
                <div class="logs-container" id="logsContainer">
                    <div class="log-line">点击上方按钮加载日志...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div class="confirm-dialog" id="confirmDialog">
        <div class="confirm-box">
            <h3>⚠️ 确认清理数据</h3>
            <p id="confirmMessage">您确定要清理选定的数据吗？此操作不可逆！</p>
            <div class="checkbox-group" id="clearOptions">
                <div class="checkbox-item">
                    <input type="checkbox" id="clearInteractions" value="interactions">
                    <label for="clearInteractions">
                        清空所有用户交互记录
                        <span class="count" id="interactionsCount">--</span>
                    </label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="clearFavorites" value="favorites">
                    <label for="clearFavorites">
                        只清空收藏记录
                        <span class="count" id="favoritesCount">--</span>
                    </label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="clearViews" value="views">
                    <label for="clearViews">
                        只清空浏览记录
                        <span class="count" id="viewsCount">--</span>
                    </label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="clearTags" value="tags">
                    <label for="clearTags">
                        清空所有标签和标签关联
                        <span class="count" id="tagsCount">--</span>
                    </label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="clearThumbnails" value="thumbnails">
                    <label for="clearThumbnails">
                        清空缩略图缓存
                        <span class="count" id="thumbnailsCount">--</span>
                    </label>
                </div>
            </div>
            <div class="button-group" style="margin-top: 25px;">
                <button class="btn btn-warning" onclick="previewClear()">预览影响</button>
                <button class="btn btn-success" onclick="executeClear()">确认清理</button>
                <button class="btn btn-danger" onclick="closeConfirm()">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 状态管理 ==========

        let autoRefreshInterval = null;
        let autoRefreshEnabled = false;

        function showAppAlert(message, type) {
            const alert = document.getElementById('appAlert');
            alert.className = `alert ${type} show`;
            alert.textContent = message;

            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        function showDbAlert(message, type) {
            const alert = document.getElementById('dbAlert');
            alert.className = `alert ${type} show`;
            alert.textContent = message;

            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        function updateRefreshTime() {
            const now = new Date();
            document.getElementById('refreshTime').textContent = now.toLocaleString('zh-CN');
        }

        // ========== API 调用 ==========

        async function apiCall(url, method = 'GET', data = null) {
            try {
                const options = {
                    method: method,
                    headers: {}
                };

                if (data) {
                    options.headers['Content-Type'] = 'application/json';
                    options.body = JSON.stringify(data);
                }

                const response = await fetch(url, options);
                const result = await response.json();
                return result;
            } catch (error) {
                console.error('API调用失败:', error);
                return { success: false, message: '网络请求失败' };
            }
        }

        // ========== 服务管理 ==========

        async function refreshServices() {
            const refreshBtn = document.getElementById('refreshBtn');
            if (refreshBtn) {
                refreshBtn.disabled = true;
                refreshBtn.textContent = '加载中...';
            }

            const result = await apiCall('/api/services/status');

            if (refreshBtn) {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '刷新';
            }

            if (result.success) {
                const services = result.services;
                const container = document.getElementById('servicesList');

                container.innerHTML = services.map(svc => {
                    const statusClass = svc.running ? 'success' : 'danger';
                    const statusText = svc.running ? '运行中' : '已停止';
                    const statusIcon = svc.running ? '🟢' : '🔴';
                    const canControl = svc.key !== 'admin'; // admin 服务不能被控制

                    return `
                        <div class="service-item" style="border-left-color: ${svc.running ? '#28a745' : '#dc3545'};">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div style="flex: 1;">
                                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                                        <span style="font-weight: bold; font-size: 1.1em;">${svc.name}</span>
                                        <span class="status-badge status-${statusClass}">${statusIcon} ${statusText}</span>
                                    </div>
                                    <div style="color: #666; font-size: 0.9em; margin-bottom: 5px;">
                                        <span>🏷️ 名称: ${svc.name}</span>
                                        <span style="margin-left: 15px;">🌐 端口: ${svc.port}</span>
                                    </div>
                                    ${svc.pid ? `<div style="color: #888; font-size: 0.85em;">📊 PID: ${svc.pid}</div>` : ''}
                                </div>
                                ${canControl ? `
                                    <div class="service-actions">
                                        ${!svc.running ? `
                                            <button class="btn btn-success" style="padding: 6px 12px; font-size: 0.85em;"
                                                    onclick="startService('${svc.key}')" id="start-${svc.key}">
                                                ▶️ 启动
                                            </button>
                                        ` : ''}
                                        ${svc.running ? `
                                            <button class="btn btn-warning" style="padding: 6px 12px; font-size: 0.85em;"
                                                    onclick="stopService('${svc.key}')" id="stop-${svc.key}">
                                                ⏹️ 停止
                                            </button>
                                            <button class="btn btn-primary" style="padding: 6px 12px; font-size: 0.85em;"
                                                    onclick="restartService('${svc.key}')" id="restart-${svc.key}">
                                                🔄 重启
                                            </button>
                                        ` : ''}
                                    </div>
                                ` : `
                                    <div style="color: #999; font-size: 0.85em; font-style: italic;">
                                        当前服务
                                    </div>
                                `}
                            </div>
                        </div>
                    `;
                }).join('');

                // 更新系统状态
                const system = result.system;
                const systemStatus = document.getElementById('systemStatus');
                if (systemStatus && system) {
                    systemStatus.style.display = 'block';
                    const statusItems = systemStatus.querySelectorAll('.status-item');
                    statusItems[0].querySelector('.status-value').textContent = `${system.cpu_percent}%`;
                    statusItems[1].querySelector('.status-value').textContent = `${system.memory_used.toFixed(1)}GB (${system.memory_percent}%)`;
                    statusItems[2].querySelector('.status-value').textContent = `${system.disk_used.toFixed(1)}GB (${system.disk_percent}%)`;
                }

                // 更新时间
                updateRefreshTime();

                // 显示成功消息
                const runningCount = services.filter(s => s.running).length;
                showAppAlert(`服务状态: ${runningCount}/${services.length} 运行中`, 'success');
            } else {
                showAppAlert('获取服务状态失败: ' + result.message, 'error');
            }
        }

        async function startService(svcKey) {
            const btn = document.getElementById(`start-${svcKey}`);
            if (btn) {
                btn.disabled = true;
                btn.textContent = '启动中...';
            }

            const result = await apiCall(`/api/services/${svcKey}/start`, 'POST');

            if (result.success) {
                showAppAlert(result.message, 'success');
                setTimeout(refreshServices, 3000);
            } else {
                showAppAlert(result.message, 'error');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '▶️ 启动';
                }
            }
        }

        async function stopService(svcKey) {
            const btn = document.getElementById(`stop-${svcKey}`);
            if (btn) {
                btn.disabled = true;
                btn.textContent = '停止中...';
            }

            const result = await apiCall(`/api/services/${svcKey}/stop`, 'POST');

            if (result.success) {
                showAppAlert(result.message, 'success');
                setTimeout(refreshServices, 3000);
            } else {
                showAppAlert(result.message, 'error');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '⏹️ 停止';
                }
            }
        }

        async function restartService(svcKey) {
            const btn = document.getElementById(`restart-${svcKey}`);
            if (btn) {
                btn.disabled = true;
                btn.textContent = '重启中...';
            }

            const result = await apiCall(`/api/services/${svcKey}/restart`, 'POST');

            if (result.success) {
                showAppAlert(result.message, 'success');
                setTimeout(refreshServices, 5000); // 重启需要更长时间
            } else {
                showAppAlert(result.message, 'error');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '🔄 重启';
                }
            }
        }

        // ========== 数据库管理 ==========

        async function refreshDbStats() {
            const result = await apiCall('/api/db/stats');

            if (result.success) {
                const stats = result.stats;

                document.querySelector('#dbStats .db-stat-item:nth-child(1) .db-stat-value').textContent = stats.video_count;
                document.querySelector('#dbStats .db-stat-item:nth-child(2) .db-stat-value').textContent = stats.tag_count;
                document.querySelector('#dbStats .db-stat-item:nth-child(3) .db-stat-value').textContent = stats.favorite_count;
                document.querySelector('#dbStats .db-stat-item:nth-child(4) .db-stat-value').textContent = stats.view_count;
                document.querySelector('#dbStats .db-stat-item:nth-child(5) .db-stat-value').textContent = stats.db_size_mb + ' MB';

                // 更新清理选项的计数
                document.getElementById('interactionsCount').textContent = stats.interaction_count + ' 条';
                document.getElementById('favoritesCount').textContent = stats.favorite_count + ' 条';
                document.getElementById('viewsCount').textContent = stats.view_count + ' 条';
                document.getElementById('tagsCount').textContent = stats.tag_count + ' 个';
                document.getElementById('thumbnailsCount').textContent = '缓存文件';

                showDbAlert('数据已刷新', 'success');
            } else {
                showDbAlert('获取统计失败: ' + result.message, 'error');
            }
        }

        function confirmClear() {
            document.getElementById('confirmDialog').classList.add('show');
        }

        function closeConfirm() {
            document.getElementById('confirmDialog').classList.remove('show');
        }

        async function previewClear() {
            const checkboxes = document.querySelectorAll('#clearOptions input[type="checkbox"]:checked');

            if (checkboxes.length === 0) {
                alert('请选择要清理的数据类型');
                return;
            }

            let message = '预览结果:\n\n';

            for (const checkbox of checkboxes) {
                const result = await apiCall('/api/db/clear', 'POST', {
                    type: checkbox.value,
                    dry_run: true
                });

                if (result.success) {
                    message += `• ${checkbox.nextElementSibling.textContent.trim()}\n  ${result.message}\n\n`;
                } else {
                    message += `• ${checkbox.value}: ${result.message}\n\n`;
                }
            }

            alert(message);
        }

        async function executeClear() {
            const checkboxes = document.querySelectorAll('#clearOptions input[type="checkbox"]:checked');

            if (checkboxes.length === 0) {
                alert('请选择要清理的数据类型');
                return;
            }

            if (!confirm('警告: 此操作不可逆！\n\n您确定要清理选定的数据吗？')) {
                return;
            }

            let successCount = 0;
            let failCount = 0;

            for (const checkbox of checkboxes) {
                const result = await apiCall('/api/db/clear', 'POST', {
                    type: checkbox.value,
                    dry_run: false
                });

                if (result.success) {
                    successCount++;
                    console.log('清理成功:', checkbox.value, result.message);
                } else {
                    failCount++;
                    console.error('清理失败:', checkbox.value, result.message);
                }
            }

            closeConfirm();

            if (failCount === 0) {
                showDbAlert(`成功清理 ${successCount} 项数据`, 'success');
                setTimeout(refreshDbStats, 1000);
            } else {
                showDbAlert(`清理完成: 成功 ${successCount} 项, 失败 ${failCount} 项`, 'warning');
                setTimeout(refreshDbStats, 1000);
            }
        }

        // ========== 日志查看 ==========

        async function loadLogs(type, lines) {
            const result = await apiCall(`/api/logs?type=${type}&lines=${lines}`);

            if (result.success) {
                const container = document.getElementById('logsContainer');
                container.innerHTML = result.logs.map(line => {
                    let className = 'log-line';

                    if (line.includes('[ERROR]') || line.includes('[CRITICAL]')) {
                        className += ' error';
                    } else if (line.includes('[WARNING]')) {
                        className += ' warning';
                    } else if (line.includes('[INFO]')) {
                        className += ' info';
                    }

                    return `<div class="${className}">${line.trim()}</div>`;
                }).join('');

                container.scrollTop = container.scrollHeight;
            } else {
                document.getElementById('logsContainer').innerHTML = `<div class="log-line error">加载日志失败: ${result.message}</div>`;
            }
        }

        // ========== 初始化 ==========

        document.addEventListener('DOMContentLoaded', function() {
            refreshServices();
            refreshDbStats();

            // 每分钟自动刷新服务状态
            setInterval(refreshServices, 60000);
        });
    </script>
</body>
</html>
