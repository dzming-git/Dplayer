    networks:
      - dplayer-network
    command: ["python", "thumbnail_service.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  dplayer-network:
    driver: bridge

# 数据卷定义
volumes:
  dplayer-data-1:
    driver: local
  dplayer-data-2:
    driver: local
  dplayer-data-3:
    driver: local
  dplayer-logs-1:
    driver: local
  dplayer-logs-2:
    driver: local
  dplayer-logs-3:
    driver: local
